<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Todo list</title>
</head>
<body>
    <div class="todo">
        <h1>Todo List</h1>
        <div class="todo__container--display">
            <input id="textValue" type="text" placeholder="Введите новую задачу...">
            <button id="add">Добавить</button>
        </div>
        <hr class="line">
        <ul class="list__tasks" id="list">
          
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
